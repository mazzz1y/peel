name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          accept-android-sdk-licenses: true
          log-accepted-android-sdk-licenses: false

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Setup signing keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore

      - name: Create local.properties
        run: |
          echo "KEYSTORE_FILE=release.keystore" > local.properties
          echo "ALIAS_NAME=peel" >> local.properties
          echo "KEYSTORE_PASS=${{ secrets.KEYSTORE_PASS }}" >> local.properties
          echo "ALIAS_PASS=${{ secrets.KEYSTORE_PASS }}" >> local.properties

      # - name: Authenticate to Google Cloud
      #   uses: google-github-actions/auth@v3
      #   with:
      #     workload_identity_provider: projects/29811119602/locations/global/workloadIdentityPools/github-actions/providers/github-repo
      #     service_account: play-publisher@peel-android.iam.gserviceaccount.com

      - name: Get version info
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          SEMVER=${TAG%%-*}
          [[ "$SEMVER" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo "::error::Invalid semver in tag: $TAG"; exit 1; }
          IFS='.' read -r MAJOR MINOR PATCH <<< "$SEMVER"
          CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          echo "name=v$TAG" >> $GITHUB_OUTPUT
          echo "version=$TAG" >> $GITHUB_OUTPUT
          echo "code=$CODE" >> $GITHUB_OUTPUT
          if [[ "$TAG" == *-* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi
      
      # - name: Publish to Google Play
      #   run: ./gradlew publishReleaseBundle

      - name: Build Release APK
        run: ./gradlew assembleRelease -PVERSION_NAME=${{ steps.version.outputs.version }} -PVERSION_CODE=${{ steps.version.outputs.code }}

      - name: Build Release AAB
        run: ./gradlew bundleRelease -PVERSION_NAME=${{ steps.version.outputs.version }} -PVERSION_CODE=${{ steps.version.outputs.code }}

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          VERSION="${{ steps.version.outputs.name }}"
          for apk in app/build/outputs/apk/release/app-*-release.apk; do
            abi="$(basename "$apk" | sed 's/^app-//;s/-release\.apk$//')"
            cp "$apk" "release-assets/peel-${VERSION}-${abi}.apk"
          done
          cp app/build/outputs/bundle/release/app-release.aab "release-assets/peel-${VERSION}.aab"
          ls -lh release-assets/

      - name: Create Release
        run: |
          CHANGELOG="metadata/en-US/changelogs/${{ steps.version.outputs.code }}.txt"
          if [ ! -f "$CHANGELOG" ]; then
            echo "::error::Changelog not found: $CHANGELOG"
            exit 1
          fi
          gh release create ${{ github.ref_name }} \
            --title "${{ steps.version.outputs.name }}" \
            --notes-file "$CHANGELOG" \
            ${{ steps.version.outputs.prerelease == 'true' && '--prerelease' || '' }} \
            release-assets/*.apk release-assets/*.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
