name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          accept-android-sdk-licenses: true
          log-accepted-android-sdk-licenses: false

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Setup signing keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore

      - name: Create local.properties
        run: |
          echo "KEYSTORE_FILE=release.keystore" > local.properties
          echo "ALIAS_NAME=peel" >> local.properties
          echo "KEYSTORE_PASS=${{ secrets.KEYSTORE_PASS }}" >> local.properties
          echo "ALIAS_PASS=${{ secrets.KEYSTORE_PASS }}" >> local.properties

      # - name: Authenticate to Google Cloud
      #   uses: google-github-actions/auth@v3
      #   with:
      #     workload_identity_provider: projects/29811119602/locations/global/workloadIdentityPools/github-actions/providers/github-repo
      #     service_account: play-publisher@peel-android.iam.gserviceaccount.com

      - name: Get version info
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "name=$TAG" >> $GITHUB_OUTPUT
          if [[ "$TAG" == *-* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi
      
      # - name: Publish to Google Play
      #   run: ./gradlew publishReleaseBundle

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          VERSION="${{ steps.version.outputs.name }}"
          for apk in app/build/outputs/apk/release/app-*-release.apk; do
            abi="$(basename "$apk" | sed 's/^app-//;s/-release\.apk$//')"
            cp "$apk" "release-assets/peel-${VERSION}-${abi}.apk"
          done
          ls -lh release-assets/

      - name: Create Release
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ steps.version.outputs.name }}" \
            --generate-notes \
            ${{ steps.version.outputs.prerelease == 'true' && '--prerelease' || '' }} \
            release-assets/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
