<!DOCTYPE html>
<!-- Query params:
       host - hostname (display only)
       url  - the original URL the user was navigating to -->
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="light dark">
<title></title>
<style>
:root {
  color-scheme: light dark;
  /* Material 3 color tokens */
  --md-sys-color-surface: light-dark(#fff, #1c1b1f);
  --md-sys-color-on-surface: light-dark(#1c1b1f, #e6e1e5);
  --md-sys-color-on-surface-variant: light-dark(#49454f, #cac4d0);
  --md-sys-color-primary: light-dark(#0061e0, #a8c8ff);
  --md-sys-color-on-primary: light-dark(#ffffff, #003062);
  --md-sys-color-outline: light-dark(#79747e, #938f99);
  --md-sys-color-surface-variant: light-dark(#f3edf7, #2b2930);
  --md-sys-color-error: light-dark(#b3261e, #ffb4ab);
  --md-sys-color-on-error: light-dark(#ffffff, #690005);

  /* Material 3 type scale */
  --md-sys-typescale-headline-small: 400 1.5rem/2rem "Roboto", system-ui, sans-serif;
  --md-sys-typescale-body-medium: 400 0.875rem/1.25rem "Roboto", system-ui, sans-serif;
  --md-sys-typescale-body-small: 400 0.75rem/1rem "Roboto", system-ui, sans-serif;
  --md-sys-typescale-label-large: 500 0.875rem/1.25rem "Roboto", system-ui, sans-serif;
}

* { box-sizing: border-box; }
[hidden] { display: none !important; }
html, body { margin: 0; padding: 0; }

body {
  background: var(--md-sys-color-surface);
  color: var(--md-sys-color-on-surface);
  font: var(--md-sys-typescale-body-medium);
  min-height: 100dvh;
  padding:
    max(env(safe-area-inset-top), 1.5rem)
    max(env(safe-area-inset-right), 1.5rem)
    max(env(safe-area-inset-bottom), 1.5rem)
    max(env(safe-area-inset-left), 1.5rem);
  display: grid;
  place-items: center;
}

main {
  width: 100%;
  max-width: 22.5rem;
  text-align: center;
  display: flex;
  flex-direction: column;
}

.warn-icon {
  font-size: 2.5rem;
  line-height: 1;
  margin: 0 auto 1rem;
  display: block;
}

h1 {
  font: var(--md-sys-typescale-headline-small);
  margin: 0 0 1rem;
  color: var(--md-sys-color-error);
}

p {
  margin: 0 0 1rem;
  color: var(--md-sys-color-on-surface);
  font: var(--md-sys-typescale-body-medium);
}

.host {
  color: var(--md-sys-color-on-surface);
  font-weight: 700;
  overflow-wrap: anywhere;
  word-break: normal;
}

.tech {
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0.5rem 0 1.5rem;
  padding: 1rem;
  min-height: 5rem;
  border-radius: 1rem;
  background: var(--md-sys-color-surface-variant);
  color: var(--md-sys-color-on-surface-variant);
  font-family: ui-monospace, "Roboto Mono", monospace;
  font-size: 0.8125rem;
  line-height: 1.25rem;
  white-space: pre-wrap;
  overflow-wrap: anywhere;
  word-break: normal;
  text-align: center;
}

.actions {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  margin-top: 0;
  align-items: stretch;
}
.actions .md-button { width: 100%; }

.md-button {
  position: relative;
  display: inline-flex; align-items: center; justify-content: center;
  isolation: isolate;
  appearance: none;
  box-sizing: border-box;
  height: 2.875rem;
  padding: 0 1.5rem;
  min-width: 4rem;
  border: none;
  border-radius: 9999px;
  font: var(--md-sys-typescale-label-large);
  letter-spacing: 0.00625em;
  text-align: center;
  white-space: nowrap;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  -webkit-user-select: none;
  transition: box-shadow 150ms cubic-bezier(.2,0,0,1);
}
.md-button::before {
  content: ""; position: absolute; inset: 0;
  border-radius: inherit;
  background: currentColor; opacity: 0;
  pointer-events: none;
  transition: opacity 150ms cubic-bezier(.2,0,0,1);
}
.md-button:hover::before { opacity: 0.08; }
.md-button:focus-visible::before { opacity: 0.10; }
.md-button:active::before { opacity: 0.10; }
.md-button:focus { outline: none; }
.md-button:focus-visible { outline: 3px solid var(--md-sys-color-primary); outline-offset: 2px; }

.md-button--filled {
  background: var(--md-sys-color-primary);
  color: var(--md-sys-color-on-primary);
}
.md-button--outlined {
  background: transparent;
  color: var(--md-sys-color-primary);
  border: 2px solid var(--md-sys-color-primary);
}

.md-button:disabled,
.md-button[aria-disabled="true"] {
  cursor: default; pointer-events: none;
}
.md-button--filled:disabled {
  background: color-mix(in srgb, var(--md-sys-color-on-surface) 12%, transparent);
  color: color-mix(in srgb, var(--md-sys-color-on-surface) 38%, transparent);
}
.md-button--outlined:disabled {
  color: color-mix(in srgb, var(--md-sys-color-on-surface) 38%, transparent);
  border-color: color-mix(in srgb, var(--md-sys-color-on-surface) 12%, transparent);
}
/* Compensate for thicker outline so heights match the filled button */
.md-button--outlined { height: 2.875rem; }

.md-button.hold { overflow: hidden; touch-action: manipulation; -webkit-touch-callout: none; }
.md-button .hold-fill {
  position: absolute; inset: 0;
  background: var(--md-sys-color-error); opacity: 0.16;
  transform: scaleX(0); transform-origin: left center;
  transition: transform 0s linear;
  pointer-events: none;
  z-index: 0;
}
.md-button.holding {
  color: var(--md-sys-color-error);
  border-color: var(--md-sys-color-error);
}
.md-button.holding .hold-fill {
  transform: scaleX(1);
  transition: transform var(--hold-duration, 2s) linear;
}
.md-button .hold-label { position: relative; z-index: 1; }

.note {
  margin: 1rem 0 0;
  font: var(--md-sys-typescale-body-small);
  color: var(--md-sys-color-on-surface-variant);
}

/* Tablet / desktop: keep stacked column layout but cap width and tighten spacing */
@media (min-width: 600px) {
  main { max-width: 25rem; }
}
</style>
</head>

      <span class="hold-fill" aria-hidden="true"></span>
      <span class="hold-label" id="acceptLabel"></span>
    </button>
  </div>
  <p class="note" id="note"></p>

  function pickStrings() {
    var langs = (navigator.languages && navigator.languages.length)
      ? navigator.languages
      : [navigator.language || "en"];
    for (var i = 0; i < langs.length; i++) {
      var tag = String(langs[i] || "").toLowerCase();
      if (STRINGS[tag]) return STRINGS[tag];
      var primary = tag.split("-")[0];
      if (STRINGS[primary]) return STRINGS[primary];
    }
    return STRINGS.en;
  }

  var queryString = "";
  var qIdx = document.documentURI.indexOf("?");
  if (qIdx >= 0) queryString = document.documentURI.substring(qIdx + 1);
  var params = new URLSearchParams(queryString);

  var originalUrl = params.get("url") || "";
  var displayHost = params.get("host") || "";
  if (!displayHost && originalUrl) {
    try { displayHost = new URL(originalUrl).host || ""; } catch (e) {}
  }

  var info = null;
  try {
    if (typeof document.getFailedCertSecurityInfo === "function") {
      info = document.getFailedCertSecurityInfo();
    }
  } catch (e) {}

  var canBypass =
    typeof document.addCertException === "function" &&
    !(info && info.errorIsOverridable === false);

  var t = pickStrings();
  document.documentElement.lang = (navigator.language || "en").split("-")[0];
  document.title = t.title;
  document.getElementById("title").textContent = t.title;
  document.getElementById("intro1").textContent = t.intro1;

  var acceptLabel = document.getElementById("acceptLabel");
  if (!canBypass) {
    acceptBtn.hidden = true;
    document.getElementById("note").hidden = true;
  } else {
    var HOLD_MS = 2000;
    var holdGen = 0;
    var holding = false;
    var committed = false;
    acceptLabel.textContent = t.accept;
    acceptBtn.style.setProperty("--hold-duration", (HOLD_MS / 1000) + "s");

    function commit(gen) {
      if (committed || gen !== holdGen) return;
      committed = true;
      acceptBtn.disabled = true;
      acceptBtn.classList.remove("holding");
      document.addCertException(true).then(
        function () {
          if (originalUrl) location.replace(originalUrl);
          else location.reload();
        },
        function (err) {
          committed = false;
          acceptBtn.disabled = false;
          acceptLabel.textContent = t.accept;
          console.error("addCertException failed", err);
        }
      );
    }

    function startHold(e) {
      if (committed || holding || acceptBtn.disabled) return;
      if ((e.type === "mousedown" || e.type === "pointerdown") &&
          e.button !== 0 && e.button !== -1) return;
      e.preventDefault();
      holding = true;
      holdGen += 1;
      var gen = holdGen;
      acceptBtn.classList.add("holding");
      acceptLabel.textContent = t.acceptHolding;
      setTimeout(function () { commit(gen); }, HOLD_MS);
    }

    function cancelHold() {
      if (committed || !holding) return;
      holding = false;
      holdGen += 1;
      acceptBtn.classList.remove("holding");
      acceptLabel.textContent = t.accept;
    }

    if (window.PointerEvent) {
      acceptBtn.addEventListener("pointerdown", startHold);
      acceptBtn.addEventListener("pointerup", cancelHold);
      acceptBtn.addEventListener("pointercancel", cancelHold);
      acceptBtn.addEventListener("pointerleave", cancelHold);
    } else {
      acceptBtn.addEventListener("mousedown", startHold);
      acceptBtn.addEventListener("mouseup", cancelHold);
      acceptBtn.addEventListener("mouseleave", cancelHold);
      acceptBtn.addEventListener("touchstart", startHold, { passive: false });
      acceptBtn.addEventListener("touchend", cancelHold);
      acceptBtn.addEventListener("touchcancel", cancelHold);
    }
    acceptBtn.addEventListener("click", function (e) { e.preventDefault(); });
    acceptBtn.addEventListener("blur", cancelHold);
    document.addEventListener("visibilitychange", function () {
      if (document.hidden) cancelHold();
    });
  }
})();
</script>
</body>
</html>
